<!-- Desktop Sidebar -->
<nav
  class="hidden md:flex fixed left-0 top-0 h-screen w-20 lg:w-64 border-r border-border flex-col items-center lg:items-start p-4 bg-background z-50"
>
  <!-- Logo -->
  <div class="mb-20 px-2">
    <a routerLink="/" class="text-2xl font-bold hidden lg:block">
      <i class="fas fa-code"></i>
    </a>
    <div class="lg:hidden text-2xl font-bold">T</div>
  </div>


  <!-- Menu Items -->
  <div class="flex flex-col gap-2 w-full">
    <button
      *ngFor="let item of items"
      [routerLink]="item.routerLink"
      routerLinkActive="bg-muted text-foreground"
      class="justify-start gap-4 h-12 flex items-center w-full px-4 rounded-lg hover:bg-muted/70 transition"
    >
      <i class="{{ item.icon }} h-6 w-6 flex-shrink-0"></i>
      <span class="hidden lg:inline">{{ item.label }}</span>
    </button>
  </div>

  <!-- Logout -->
  <div class="mt-auto w-full">
    <button
      (click)="logout()"
      class="justify-start gap-4 h-12 flex items-center w-full px-4 rounded-lg hover:bg-destructive/20 text-destructive transition"
    >
      <i class="fas fa-sign-out-alt h-6 w-6"></i>
      <!-- <span class="hidden lg:inline">Logout</span> -->
    </button>
  </div>
</nav>

<!-- Mobile Navigation Bar -->
<nav
  class="md:hidden fixed bottom-0 left-0 right-0 h-16 border-t border-border bg-background flex items-center justify-around px-4 z-50"
>
  <button
    *ngFor="let item of items"
    [routerLink]="item.routerLink"
    routerLinkActive="text-primary"
    class="h-12 w-12 flex flex-col items-center justify-center hover:text-primary transition"
  >
    <i class="{{ item.icon }} h-6 w-6"></i>
  </button>

  <!-- Logout mobile -->
  <button
    (click)="logout()"
    class="h-12 w-12 flex flex-col items-center justify-center text-destructive"
  >
    <i class="fas fa-sign-out-alt h-6 w-6"></i>
  </button>
</nav>
